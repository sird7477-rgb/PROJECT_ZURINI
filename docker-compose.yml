services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zurini
      POSTGRES_USER: zurini
      POSTGRES_PASSWORD: zurini
    ports:
      - "${ZURINI_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zurini -d zurini"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - zurini-postgres:/var/lib/postgresql/data

volumes:
  zurini-postgres:
